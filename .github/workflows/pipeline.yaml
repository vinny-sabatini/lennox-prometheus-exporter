---
on:
  push:
    branches:
    - main
    tags:
    - "*"
  pull_request:
    branches:
    - main
env:
  PYTHON_VERSION: 3.14.3
  DOCKER_IMAGE: quay.io/vinny_sabatini/lennox-prometheus-exporter
jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Install Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ env.PYTHON_VERSION }}
    - name: Run Python Black
      uses: psf/black@stable
    - name: Set up Helm
      uses: azure/setup-helm@v5.0.0
    - name: Set up chart-testing
      uses: helm/chart-testing-action@v2.8.0
    - name: Run helm lint
      run: helm lint deploy/chart
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4
    - name: Build image
      uses: docker/build-push-action@v7
      with:
        context: .
        push: false
        tags: ${{ env.DOCKER_IMAGE }}:dev
        platforms: linux/amd64,linux/arm64
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out the repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Prepare
        id: prep
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          TAGS="${{ env.DOCKER_IMAGE }}:${VERSION},${{ env.DOCKER_IMAGE }}:latest"
          echo "tags=${TAGS}" >> $GITHUB_OUTPUT
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      - name: Login to quay.io
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_TOKEN }}
          registry: quay.io
      - name: Build and push to quay.io
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.prep.outputs.tags }}
          platforms: linux/amd64,linux/arm64
      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"
      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.7.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          charts_dir: deploy/chart
